<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Infinite Zip</title>
    <link rel="stylesheet" href="./src/ui/styles.css">
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <div class="brand">
          <span class="mark" aria-hidden="true"></span>
          <div>
            <h1>Infinite Zip</h1>
            <p id="loop-state">Generate</p>
          </div>
        </div>
        <div class="session-meta">
          <span id="elapsed-time">0s</span>
          <span id="completion-state">Open</span>
        </div>
      </header>

      <section class="workspace" aria-label="Puzzle">
        <header class="workspace-header">
          <div>
            <h2 id="candidate-title">Ready</h2>
          </div>
          <div class="stats" id="stats"></div>
        </header>
        <div id="board" class="board" aria-label="Zip board"></div>
        <p id="status" class="status" aria-live="polite"></p>
      </section>

      <section class="feedback-panel" aria-label="Human feedback">
        <button id="hint" type="button">Hint</button>

        <label>
          <span>Enjoyment <output id="enjoyment-value">5</output></span>
          <input id="enjoyment-score" type="range" min="0" max="9" step="1" value="5">
        </label>

        <label>
          <span>Difficulty</span>
          <select id="difficulty-rating">
            <option value="too_easy">Too easy</option>
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard" selected>Hard</option>
          </select>
        </label>

        <label>
          <span>Hints</span>
          <input id="hint-count" type="number" min="0" value="0" readonly>
        </label>

        <button id="submit-next" type="button">Save & Next</button>
      </section>
    </main>

    <script type="module" src="./src/ui/app.js"></script>
  </body>
</html>
