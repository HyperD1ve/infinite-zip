<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Infinite Zip</title>
    <link rel="stylesheet" href="./src/ui/styles.css">
  </head>
  <body>
    <main class="app">
      <section class="toolbar" aria-label="Iteration controls">
        <div class="brand">
          <span class="mark" aria-hidden="true"></span>
          <div>
            <h1>Infinite Zip</h1>
            <p id="loop-state">Generate</p>
          </div>
        </div>

        <section class="panel" aria-label="Generate candidate">
          <header>
            <h2>Generate</h2>
            <span id="candidate-count">0 saved</span>
          </header>

          <div class="field-grid">
            <label>
              <span>Rows</span>
              <select id="rows">
                <option>4</option>
                <option selected>5</option>
                <option>6</option>
                <option>7</option>
              </select>
            </label>

            <label>
              <span>Cols</span>
              <select id="cols">
                <option>4</option>
                <option selected>5</option>
                <option>6</option>
                <option>7</option>
              </select>
            </label>
          </div>

          <label>
            <span>Target</span>
            <select id="target">
              <option value="easy">Easy</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard</option>
            </select>
          </label>

          <label class="seed-field">
            <span>Seed</span>
            <input id="seed" autocomplete="off" spellcheck="false">
          </label>

          <div class="actions actions-primary">
            <button id="generate" type="button">Generate</button>
            <button id="reset" type="button">Reset</button>
          </div>
        </section>

        <section class="panel" aria-label="Candidate queue">
          <label class="candidate-field">
            <span>Queue</span>
            <input id="candidate-path" value="assets/data/experiments/search-001-top-candidates.json" spellcheck="false">
          </label>

          <div class="actions">
            <button id="load-candidates" type="button">Load</button>
            <button id="previous-candidate" type="button">Prev</button>
            <button id="next-candidate" type="button">Next</button>
          </div>
        </section>

        <section class="panel" aria-label="Play controls">
          <header>
            <h2>Play</h2>
            <span id="elapsed-time">0s</span>
          </header>

          <div class="actions">
            <button id="reveal" type="button" aria-pressed="false">Reveal</button>
            <button id="copy" type="button">Copy</button>
          </div>
        </section>

        <section class="panel feedback-panel" aria-label="Human feedback">
          <header>
            <h2>Feedback</h2>
            <span id="completion-state">Open</span>
          </header>

          <label>
            <span>Enjoyment <output id="enjoyment-value">5</output></span>
            <input id="enjoyment-score" type="range" min="0" max="9" step="1" value="5">
          </label>

          <label>
            <span>Difficulty</span>
            <select id="difficulty-rating">
              <option value="over_easy">Over Easy</option>
              <option value="easy" selected>Easy</option>
              <option value="hard">Hard</option>
              <option value="over_hard">Over Hard</option>
            </select>
          </label>

          <label>
            <span>Hints</span>
            <input id="hint-count" type="number" min="0" value="0" readonly>
          </label>

          <div class="actions actions-primary">
            <button id="submit-feedback" type="button">Save</button>
            <button id="submit-next" type="button">Save & Next</button>
          </div>

          <button id="export-feedback" type="button">Copy Local CSV</button>
        </section>
      </section>

      <section class="workspace" aria-label="Puzzle">
        <header class="workspace-header">
          <div>
            <p id="candidate-source">Generated candidate</p>
            <h2 id="candidate-title">Ready</h2>
          </div>
          <div class="stats" id="stats"></div>
        </header>
        <div id="board" class="board" aria-label="Zip board"></div>
        <p id="status" class="status" aria-live="polite"></p>
      </section>
    </main>

    <script type="module" src="./src/ui/app.js"></script>
  </body>
</html>
